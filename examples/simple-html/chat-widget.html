<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGO SDK — Vanilla chat widget (mountChatWidget)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 20px;
      color: #1a1a1a;
    }
    .config {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .config label { font-weight: 500; display: block; margin-top: 10px; }
    .config input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 14px;
      padding: 10px 20px;
      background: #03182f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #chat { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>AGO — Vanilla chat widget</h1>
  <p>
    A complete chat panel mounted with <code>mountChatWidget</code> — no React.
    It installs a conversational <strong>demo request</strong> form and renders
    <strong>clickable suggested replies</strong>.
  </p>

  <div class="config">
    <label>
      Base URL
      <input id="baseUrl" value="http://localhost:8000" />
    </label>
    <label>
      Default agent (id or slug, optional)
      <input id="agent" placeholder="support-bot" />
    </label>
    <button id="mount">Mount widget</button>
  </div>

  <div id="chat"></div>

  <script type="module">
    // Build the SDK first: `npm run build` from the sdk/ root.
    import { mountChatWidget } from '../../dist/widget.js';

    let widget = null;

    document.getElementById('mount').addEventListener('click', () => {
      if (widget) widget.destroy();

      const baseUrl = document.getElementById('baseUrl').value.trim();
      const agent = document.getElementById('agent').value.trim();

      widget = mountChatWidget('#chat', {
        config: { baseUrl, agent: agent || undefined },
        title: 'Book a demo',
        welcomeMessage:
          "Hi! Tell me a bit about your team and I'll set up a demo.",
        height: 520,
        allowFiles: false,
        forms: [
          {
            name: 'demo_request',
            description: 'A request to book a product demo of AGO.',
            schema: {
              type: 'object',
              properties: {
                name: { type: 'string', description: 'Full name' },
                email: { type: 'string', description: 'Work email' },
                company: { type: 'string', description: 'Company name' },
                teamSize: { type: 'number', description: 'Team size' },
              },
              required: ['name', 'email', 'company'],
            },
            // Demo: run submit in the browser. In production prefer
            // { via: 'backend', destination: 'demo_webhook' }.
            submit: {
              via: 'client',
              handler: async (values) => {
                console.log('Demo request submitted:', values);
                return { ok: true };
              },
            },
          },
        ],
        onMessageSent: (text) => console.log('sent:', text),
        onMessageReceived: (m) => console.log('received:', m.content),
      });
    });
  </script>
</body>
</html>
