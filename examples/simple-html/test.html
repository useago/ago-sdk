<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGO SDK Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .config {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .config input {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .config label {
      font-weight: 500;
    }
    button {
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background: #0055aa;
    }
    #chat-container {
      height: 500px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
    }
    #logs {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      height: 200px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-entry {
      margin: 2px 0;
    }
    .log-event { color: #4fc3f7; }
    .log-function { color: #81c784; }
    .log-error { color: #ef5350; }
  </style>
</head>
<body>
  <h1>AGO SDK Test</h1>

  <div class="config">
    <h3>Configuration</h3>
    <label>Backend URL:</label>
    <input type="text" id="baseUrl" value="http://localhost:8000" />

    <label>Widget ID (optional):</label>
    <input type="text" id="widgetId" placeholder="Auto-generated if empty" />

    <button onclick="initSDK()">Initialiser SDK</button>
    <button onclick="registerTestFunction()">Enregistrer fonction test</button>
  </div>

  <div id="chat-container"></div>

  <h3>Logs</h3>
  <div id="logs"></div>

  <script type="module">
    import { AgoClient } from '../dist/index.js';

    let client = null;

    function log(message, type = '') {
      const logs = document.getElementById('logs');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
    }

    window.initSDK = function() {
      const baseUrl = document.getElementById('baseUrl').value;
      const widgetId = document.getElementById('widgetId').value;

      if (!baseUrl) {
        log('Veuillez remplir le Backend URL', 'log-error');
        return;
      }

      client = new AgoClient({
        baseUrl,
        ...(widgetId ? { widgetId } : {}),
        debug: true,
      });

      // Event listeners
      client.on('message:start', (data) => {
        log(`Message started: ${data.messageId}`, 'log-event');
      });

      client.on('message:chunk', (data) => {
        log(`Chunk: "${data.content.substring(0, 50)}..."`, 'log-event');
      });

      client.on('message:complete', (data) => {
        log(`Message complete: ${data.content.substring(0, 100)}...`, 'log-event');
      });

      client.on('function:invoke', (data) => {
        log(`Function invoked: ${data.functionName}(${JSON.stringify(data.arguments)})`, 'log-function');
      });

      client.on('function:result', (data) => {
        log(`Function result: ${JSON.stringify(data.result)}`, 'log-function');
      });

      client.on('message:error', (data) => {
        log(`Error: ${data.error}`, 'log-error');
      });

      log('SDK initialisé avec succès!');

      // Show chat container and create simple UI
      const container = document.getElementById('chat-container');
      container.style.display = 'flex';
      container.style.flexDirection = 'column';
      container.innerHTML = `
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
        <div style="display: flex; padding: 10px; border-top: 1px solid #ddd;">
          <input type="text" id="messageInput" placeholder="Tapez un message..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px;" />
          <button onclick="sendMessage()" style="margin-left: 10px;">Envoyer</button>
        </div>
      `;

      document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      window.client = client;
    };

    window.sendMessage = async function() {
      if (!client) {
        log('SDK non initialisé', 'log-error');
        return;
      }

      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      if (!content) return;

      input.value = '';

      // Add user message to UI
      const messages = document.getElementById('messages');
      messages.innerHTML += `<div style="text-align: right; margin: 10px 0;"><span style="background: #0066cc; color: white; padding: 8px 12px; border-radius: 12px; display: inline-block;">${content}</span></div>`;

      try {
        const response = await client.sendMessage(content);
        messages.innerHTML += `<div style="margin: 10px 0;"><span style="background: #f0f0f0; padding: 8px 12px; border-radius: 12px; display: inline-block;">${response.content}</span></div>`;
        messages.scrollTop = messages.scrollHeight;
      } catch (error) {
        log(`Erreur: ${error.message}`, 'log-error');
      }
    };

    window.registerTestFunction = function() {
      if (!client) {
        log('SDK non initialisé - initialisez d\'abord', 'log-error');
        return;
      }

      // Register a test function
      client.registerFunction(
        'showAlert',
        async ({ message }) => {
          alert(`AGO dit: ${message}`);
          return { success: true, displayed: true };
        },
        {
          description: 'Affiche une alerte avec un message à l\'utilisateur',
          parameters: {
            type: 'object',
            properties: {
              message: {
                type: 'string',
                description: 'Le message à afficher',
              },
            },
            required: ['message'],
          },
        }
      );

      client.registerFunction(
        'getCurrentTime',
        async () => {
          const now = new Date();
          return {
            time: now.toLocaleTimeString(),
            date: now.toLocaleDateString(),
            timestamp: now.getTime(),
          };
        },
        {
          description: 'Retourne l\'heure et la date actuelles du client',
          parameters: {
            type: 'object',
            properties: {},
          },
        }
      );

      log('Fonctions enregistrées: showAlert, getCurrentTime', 'log-function');
      log('Essayez: "Quelle heure est-il?" ou "Affiche une alerte avec le message Bonjour"');
    };
  </script>
</body>
</html>
