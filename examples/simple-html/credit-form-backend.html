<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGO · Rachat de crédits (schéma défini dans le backend)</title>

    <style>
      /* Minimal: just center the widget. Everything inside #ago-chat is AGO's. */
      #ago-chat {
        max-width: 560px;
        margin: 40px auto;
      }
    </style>
  </head>

  <body>
    <!-- The widget owns everything inside this element (header, stream, input). -->
    <div id="ago-chat"></div>

    <!--
      Same credit-consolidation flow as `credit-form-simple.html`, but the form's
      schema is NOT written here. It lives in the backend ("credit" form collector,
      created under AI Studio → Form Collectors) and the SDK fetches it by name when
      the widget mounts (GET /api/sdk/v1/forms/credit, via loadFormCollector).

      So the page carries no field list: change a field in the admin and every page
      that references { name: "credit" } picks it up on the next load — no redeploy.

      Imports point at the local build (`../../dist/…`) because the name-only `forms`
      entry isn't published to esm.sh yet. Run `npm run build` in `sdk/` first.
    -->
    <script type="module">
      import { mountChatWidget } from "../../dist/widget.js";
      import { initDevPanel } from "../../dist/devtools.js";

      // ─── Configuration ────────────────────────────────────────────────
      const AGENT_ID = "credit2";

      // ─── Mount the widget ─────────────────────────────────────────────
      // mountChatWidget builds its own AgoClient from `config`, renders the full
      // chat panel, streams replies, and installs the "credit" form collector —
      // here resolved from the backend because the entry is just `{ name: "credit" }`
      // (no inline `schema`). A full config with `schema` would define it inline.
      const widget = mountChatWidget("#ago-chat", {
        config: {
          baseUrl: window.AGO_BASE_URL ?? "https://weendeal.api.useago.com",
          agent: AGENT_ID,
        },
        persistConversation: true,
        title: "Rachat de crédits",
        welcomeMessage:
          "Bonjour 👋 Je vous accompagne dans votre demande de rachat / regroupement de crédits. Pour commencer, êtes-vous propriétaire de votre logement ?",
        placeholder: "Écris un message…",
        // Backend-defined: the description, schema and submit target all come from
        // the "credit" definition stored in AGO. Pass extra keys here only to
        // override the fetched ones (e.g. a client-only submit `handler`).
        forms: [{ name: "credit" }],
      });

      // ─── Dev panel (opt-in via ?dev) ──────────────────────────────────
      // Once the definition loads and the collector installs, the panel renders its
      // live state (values, missing, complete) and logs each update_credit call.
      const DEV = new URLSearchParams(location.search).has("dev");
      if (DEV) initDevPanel({ client: widget.client });
    </script>
  </body>
</html>
