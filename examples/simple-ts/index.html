<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGO Chat — Pure TS Example (mountChatWidget)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 640px;
        margin: 40px auto;
        padding: 0 20px;
        color: #1a1a1a;
      }
      h1 { font-size: 20px; }
      p { color: #4a5560; line-height: 1.5; }
      #chat { margin-top: 24px; }
    </style>
  </head>
  <body>
    <h1>AGO — Pure TS chat widget</h1>
    <p>
      A complete chat panel mounted with <code>mountChatWidget</code> — no React,
      Vue, or Angular. It installs a conversational <strong>demo request</strong>
      form (form creator) and renders <strong>clickable suggested replies</strong>.
    </p>
    <div id="chat"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
